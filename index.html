<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAIZE — Simulation de Vie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Canvas principal -->
  <canvas id="main-canvas"></canvas>

  <!-- Panel info -->
  <div id="info-panel">
    <div class="cycle-indicator">☀️ Chargement…</div>
  </div>

  <!-- Titre -->
  <div id="title">HAIZE</div>

  <!-- Légende -->
  <div id="legend">
    <h3>Entités</h3>
    <!-- généré par JS -->
  </div>

  <!-- Console événements (au-dessus des contrôles) -->
  <div id="event-console">
    <div id="event-console-header">
      <span id="event-console-title">◈ CONSOLE</span>
      <span id="event-perf"></span>
      <span id="event-fps">-- fps</span>
    </div>
    <div id="event-console-body"></div>
  </div>

  <!-- Contrôles -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
    <span class="ctrl-label">Vitesse</span>
    <input type="range" id="speed-slider" min="0.2" max="4" step="0.1" value="1" />
    <span id="speed-val" class="ctrl-label">×1.0</span>
    <button class="ctrl-btn" id="btn-reset">↺ Reset</button>
    <span class="ctrl-sep"></span>
    <button class="ctrl-btn ctrl-btn--accent" id="btn-save">💾 Save</button>
    <button class="ctrl-btn" id="btn-load">📂 Load</button>
    <button class="ctrl-btn ctrl-btn--dim" id="btn-heatmap" title="Touche H">🌡️</button>
    <span class="ctrl-sep"></span>
    <span class="ctrl-label">Événements</span>
    <button class="ctrl-btn ctrl-btn--event" id="btn-ev-tempete"  title="Déclencher Tempête">🌪️</button>
    <button class="ctrl-btn ctrl-btn--event" id="btn-ev-fete"     title="Déclencher Grande Fête">🎊</button>
    <button class="ctrl-btn ctrl-btn--event" id="btn-ev-tension"  title="Déclencher Vague de Tension">⚡</button>
    <button class="ctrl-btn ctrl-btn--event" id="btn-ev-deprime"  title="Déclencher Vague Dépressive">😶</button>
    <button class="ctrl-btn ctrl-btn--event" id="btn-ev-epidemie" title="Déclencher Épidémie d'Humeur">🦠</button>
  </div>

  <script type="module">
    import { ENTITY_DEFS, AFFINITES } from './entities.js';
    import { Simulation } from './simulation.js';

    // Canvas setup
    const canvas    = document.getElementById('main-canvas');
    const infoPanel = document.getElementById('info-panel');
    const legend    = document.getElementById('legend');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();

    // Légende
    let legendHtml = '<h3>Entités</h3>';
    for (const def of ENTITY_DEFS) {
      legendHtml += `
        <div class="legend-row">
          <span class="legend-dot" style="background:${def.color}"></span>
          <span class="legend-name">${def.id}</span>
          <span class="legend-desc">${def.label}</span>
        </div>`;
    }
    legendHtml += `<h3 style="margin-top:10px">Affinités ✨</h3>`;
    for (const [a, b, f] of AFFINITES) {
      const defA = ENTITY_DEFS.find(d => d.id === a);
      const defB = ENTITY_DEFS.find(d => d.id === b);
      legendHtml += `
        <div class="legend-row">
          <span class="legend-dot" style="background:${defA.color}"></span>
          <span class="legend-name" style="color:${defA.color}">${a}</span>
          <span class="legend-desc">↔</span>
          <span class="legend-dot" style="background:${defB.color}"></span>
          <span class="legend-name" style="color:${defB.color}">${b}</span>
          <span class="legend-desc">(${Math.round(f*100)}%)</span>
        </div>`;
    }
    legend.innerHTML = legendHtml;

    // Simulation
    const sim = new Simulation(canvas, infoPanel);
    sim.start();

    // Tracking curseur (souris) — fuite activée uniquement si Maj maintenue
    canvas.addEventListener('mousemove', (e) => {
      if (e.shiftKey) {
        sim.mouseX = e.clientX;
        sim.mouseY = e.clientY;
      } else {
        sim.mouseX = -9999;
        sim.mouseY = -9999;
      }
    });
    canvas.addEventListener('mouseleave', () => {
      sim.mouseX = -9999;
      sim.mouseY = -9999;
    });
    // Relâcher Maj = désactiver la fuite immédiatement
    window.addEventListener('keyup', (e) => {
      if (e.key === 'Shift') {
        sim.mouseX = -9999;
        sim.mouseY = -9999;
      }
    });

    // Click-to-inspect (souris)
    canvas.addEventListener('click', (e) => {
      sim.handleClick(e.clientX, e.clientY);
    });
    canvas.style.cursor = 'crosshair';

    // Support tactile (touch) — tap pour inspecter, swipe ignoré
    // Fix: ne PAS setter mouseX/Y sur touchstart (évite la fuite des entités au simple tap)
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      sim.handleClick(t.clientX, t.clientY);
      // Masquer le curseur fantôme après tap
      setTimeout(() => { sim.mouseX = -9999; sim.mouseY = -9999; }, 800);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    // Resize
    window.addEventListener('resize', () => {
      resizeCanvas();
      sim.resize();
    });

    // Contrôles
    const btnPause    = document.getElementById('btn-pause');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal    = document.getElementById('speed-val');
    const btnReset    = document.getElementById('btn-reset');

    btnPause.addEventListener('click', () => {
      sim.paused = !sim.paused;
      btnPause.textContent = sim.paused ? '▶ Play' : '⏸ Pause';
    });

    speedSlider.addEventListener('input', () => {
      const v = parseFloat(speedSlider.value);
      sim.speedFactor = v;
      speedVal.textContent = `×${v.toFixed(1)}`;
    });

    btnReset.addEventListener('click', () => {
      sim.reset();
    });

    // Save / Load
    document.getElementById('btn-save').addEventListener('click', () => sim.save());
    document.getElementById('btn-load').addEventListener('click', () => sim.load());

    // Heatmap toggle (bouton + touche H)
    const btnHeatmap = document.getElementById('btn-heatmap');
    function toggleHeatmap() {
      sim.toggleHeatmap();
      btnHeatmap.style.opacity = sim.showHeatmap ? '1' : '0.5';
    }
    btnHeatmap.addEventListener('click', toggleHeatmap);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') toggleHeatmap();
    });

    // Déclencheurs d'événements manuels
    document.getElementById('btn-ev-tempete').addEventListener('click', () => sim.triggerEvent('TEMPETE'));
    document.getElementById('btn-ev-fete').addEventListener('click',    () => sim.triggerEvent('FETE'));
    document.getElementById('btn-ev-tension').addEventListener('click', () => sim.triggerEvent('TENSION'));
    document.getElementById('btn-ev-deprime').addEventListener('click', () => sim.triggerEvent('DEPRIME'));
    document.getElementById('btn-ev-epidemie').addEventListener('click', () => sim.triggerEvent('EPIDEMIE'));

    // ── Console événements HTML — pilotée par sim.onConsoleDirty + rAF FPS ──
    const consoleBody = document.getElementById('event-console-body');
    const fpsBadge    = document.getElementById('event-fps');
    const perfBadge   = document.getElementById('event-perf');

    const CATEGORY_COLORS = {
      conflict:   '#e74c3c',
      social:     '#2ecc71',
      state:      '#a29bfe',
      saturation: '#ff7675',
      flee:       '#fd79a8',
      project:    '#00cec9',
      global:     '#fdcb6e',
      cycle:      '#74b9ff',
      info:       '#aaa',
    };

    let lastLogLen = -1;

    // Met à jour les badges FPS/perf — appelé chaque rAF (léger)
    function updateFpsBadge() {
      const fps = sim.fps;
      const fpsColor = fps >= 55 ? '#2ecc71' : fps >= 30 ? '#f1c40f' : '#e74c3c';
      fpsBadge.textContent = `${fps} fps`;
      fpsBadge.style.color = fpsColor;
      if (sim.perfUpdate !== undefined) {
        const u = sim.perfUpdate?.toFixed(1) ?? '?';
        const r = sim.perfRender?.toFixed(1) ?? '?';
        perfBadge.textContent = `u:${u}ms r:${r}ms`;
      }
      requestAnimationFrame(updateFpsBadge);
    }
    requestAnimationFrame(updateFpsBadge);

    // Rebuild console HTML — déclenché uniquement via onConsoleDirty (depuis sim loop)
    function updateConsole() {
      const log = sim.eventLog;
      lastLogLen = log.length;
      consoleBody._lastTs = log[0]?.timestamp;

      const now = performance.now();
      const MAX_SHOW = 30;
      const html = log.slice(0, MAX_SHOW).map((entry, i) => {
        const age    = Math.round((now - entry.timestamp) / 1000);
        const color  = CATEGORY_COLORS[entry.category] || entry.color || '#aaa';
        const opacity = i === 0 ? 1 : Math.max(0.3, 1 - i / MAX_SHOW * 0.8);
        return `<div class="console-line" style="opacity:${opacity.toFixed(2)}">
          <span class="console-dot" style="background:${entry.color || color}"></span>
          <span class="console-text" style="color:${color}">${entry.text}</span>
          <span class="console-age">${age}s</span>
        </div>`;
      }).join('');
      consoleBody.innerHTML = html || '<div class="console-empty">En attente d\'événements…</div>';
    }

    // Câbler le callback sur la boucle de simulation
    sim.onConsoleDirty = updateConsole;
  </script>
</body>
</html>
